<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯群物流出車</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:-apple-system;
background:#f5f7fb;
}

.wrap{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.label{
font-size:13px;
color:#666;
margin-top:10px;
}

.value{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:#06c755;
color:white;
font-size:16px;
font-weight:bold;
}

.hidden{
display:none;
}

.msg{
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<h2>🚚 出車登記</h2>

<div class="label">車號</div>
<div class="value" id="carText">讀取中...</div>

<div id="driverArea" class="hidden">

<div class="label">司機</div>
<div class="value" id="driverNameText"></div>

</div>

<div id="bindArea" class="hidden">

<input id="nameInput" placeholder="輸入姓名">
<button id="bindBtn">綁定姓名</button>

</div>

<div id="tripArea" class="hidden">

<div class="label">任務類型</div>

<select id="taskTypeSelect">

<option value="">請選擇</option>
<option value="常溫">常溫</option>
<option value="低溫">低溫</option>
<option value="爆量專車">爆量專車</option>
<option value="專車">專車</option>

</select>

<div id="routeBlock" class="hidden">

<div class="label">路線</div>
<select id="routeSelect"></select>

</div>

<div id="noteArea" class="hidden">

<div class="label">備註</div>
<input id="noteInput">

</div>

<button id="tripBtn">確認出車</button>

</div>

<div class="msg" id="msg"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
