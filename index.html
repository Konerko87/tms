<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>聯群物流出車</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:20px;
font-size:22px;
margin:0;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.hidden{
display:none !important;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:14px;
font-size:24px;
margin-top:12px;
cursor:pointer;
}

.primary{
background:#2c7be5;
color:#fff;
}

.task-btn{
background:#eee;
}

.warning{
background:#fff3cd;
padding:14px;
border-radius:12px;
margin-bottom:12px;
line-height:1.5;
}

input,select{
width:100%;
padding:14px;
font-size:22px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

#msg{
color:#c62828;
font-weight:bold;
min-height:28px;
}

.selected-task{
outline:3px solid #2c7be5;
background:#dbeafe;
}

.sub-btn{
background:#f3f4f6;
color:#111;
border:1px solid #d1d5db;
font-size:20px;
}

.loading-mask{
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loading-box{
background:#111;
color:#fff;
padding:22px 28px;
border-radius:16px;
font-size:24px;
min-width:220px;
text-align:center;
}

.modal-mask{
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
display:flex;
align-items:center;
justify-content:center;
z-index:9998;
padding:16px;
box-sizing:border-box;
}

.modal-card{
width:100%;
max-width:520px;
background:#fff;
border-radius:18px;
padding:20px;
box-sizing:border-box;
box-shadow:0 8px 24px rgba(0,0,0,0.2);
}

.modal-title{
font-size:28px;
font-weight:bold;
margin-bottom:12px;
}

.status-box{
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
margin-top:12px;
line-height:1.7;
white-space:pre-line;
}

.helper{
color:#555;
font-size:18px;
margin-top:6px;
}

/* 驗車警告 */

.inspect-danger{
background:#ffe5e5;
border:2px solid #ff4d4d;
}

/* 保養提醒 */

.maint-warning{
background:#fff7e6;
border:2px solid #ffa940;
}

/* 出車成功動畫 */

.success-animation{
animation:pop 0.4s ease;
}

@keyframes pop{

0%{transform:scale(0.8)}
100%{transform:scale(1)}

}

</style>

</head>


<body>

<div class="card">

<div style="font-size:28px;font-weight:bold;">
🚚 聯群物流出車系統
</div>

<div class="helper">
請稍候，系統會自動登入並讀取司機資料
</div>

<br>

車號：
<b id="carText"></b>

<br><br>

司機：
<b id="driverNameText"></b>

</div>


<div id="bindArea" class="card hidden">

<div style="font-size:26px;font-weight:bold;">
綁定司機
</div>

<div class="helper">
第一次使用請先輸入姓名綁定
</div>

<input id="nameInput" placeholder="請輸入姓名">

<button id="bindBtn" class="primary">
綁定
</button>

</div>


<div id="tripArea" class="card hidden">

<div class="warning">
⚠ 中區以外司機請選「區域司機」
</div>

<div style="font-size:26px;font-weight:bold;margin-bottom:8px;">
選擇任務
</div>

<button class="task-btn" data-type="常溫">
常溫配送
</button>

<button class="task-btn" data-type="低溫">
低溫配送
</button>

<button class="task-btn" data-type="爆量專車">
爆量專車
</button>

<button class="task-btn" data-type="專車">
專車
</button>

<button class="task-btn" data-type="區域司機">
區域司機
</button>


<div id="routeBlock" class="hidden" style="margin-top:14px;">

路線

<select id="routeSelect">

<option value="">
請選擇路線
</option>

</select>

</div>


<div id="areaBlock" class="hidden" style="margin-top:14px;">

區域

<select id="areaSelect">

<option value="">
請選擇區域
</option>

</select>

</div>


<div id="noteArea" class="hidden" style="margin-top:14px;">

備註

<input id="noteInput" placeholder="例如：楊梅專車">

</div>


<button id="tripBtn" class="primary">
確認出車
</button>

<p id="msg"></p>

</div>


<div id="loadingMask" class="loading-mask hidden">

<div class="loading-box" id="loadingText">

讀取中...

</div>

</div>


<div id="vehicleModal" class="modal-mask hidden">

<div class="modal-card">

<div class="modal-title" id="vehicleModalTitle">

車輛提醒

</div>

<div id="vehicleModalContent" class="status-box">

</div>

<button id="maintBtn" class="sub-btn">

保養已完成

</button>

<button id="inspectBtn" class="sub-btn">

驗車已完成

</button>

<button id="closeVehicleModalBtn" class="primary">

知道了

</button>

</div>

</div>


<script src="app.js?v=1"></script>

</body>

</html>
