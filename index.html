<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>出車系統</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

</head>

<body>

<h2>🚚 出車系統</h2>

<div style="background:#fff3cd;padding:10px;border-radius:10px;margin-bottom:10px;">
⚠ 中區以外司機請選「區域司機」
</div>

<select id="task">

<option value="">請選任務</option>

<option value="常溫">常溫配送</option>

<option value="低溫">低溫配送</option>

<option value="爆量專車">爆量專車</option>

<option value="專車">專車</option>

<option value="區域司機">區域司機</option>

</select>

<br><br>

<input id="route" placeholder="路線 / 區域">

<br><br>

<input id="note" placeholder="備註">

<br><br>

<button onclick="submitTrip()">確認出車</button>

<div id="popup" style="display:none;border:1px solid #ccc;padding:20px;margin-top:20px;"></div>

<script>

const API="你的GAS網址"

let lineId
let driverName
let car

async function init(){

await liff.init({
liffId:"你的LIFFID"
})

const profile=await liff.getProfile()

lineId=profile.userId

const url=new URL(location.href)

car=url.searchParams.get("car")

}

async function submitTrip(){

const type=document.getElementById("task").value

const route=document.getElementById("route").value

const note=document.getElementById("note").value

const res=await fetch(

API+
"?action=logTrip"+
"&lineId="+lineId+
"&name="+driverName+
"&car="+car+
"&type="+type+
"&route="+route+
"&note="+note

)

const data=await res.json()

showVehicleStatus()

}

async function showVehicleStatus(){

const res=await fetch(

API+
"?action=getVehicleStatus"+
"&car="+car

)

const data=await res.json()

document.getElementById("popup").style.display="block"

document.getElementById("popup").innerHTML=`

<h3>${car} 出車成功</h3>

<p>保養剩餘 ${data.maintRemain} 天</p>

<p>驗車期限 ${data.inspectionDate}</p>

<p>剩餘 ${data.inspectionRemain} 天</p>

<button onclick="finishMaintenance()">更新保養狀態</button>

<button onclick="finishInspection()">更新驗車狀態</button>

`

}

async function finishMaintenance(){

if(!confirm("確認保養完成?")) return

await fetch(

API+
"?action=finishMaintenance"+
"&car="+car

)

alert("保養已更新")

}

async function finishInspection(){

if(!confirm("確認驗車完成?")) return

await fetch(

API+
"?action=finishInspection"+
"&car="+car

)

alert("驗車已更新")

}

init()

</script>

</body>

</html>
