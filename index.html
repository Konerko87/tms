<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>聯群物流 出車系統</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family: -apple-system,BlinkMacSystemFont,Arial;
  background:#f5f6f8;
  padding:18px;
}
.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.hidden{ display:none; }
h2{ margin-top:0 }
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
}
.primary{
  background:#2c7be5;
  color:#fff;
}
.task-btn{
  background:#eee;
}
.warning{
  background:#fff3cd;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-weight:600;
}
input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:6px;
}
small{
  color:#666;
}
</style>
</head>

<body>

<div class="card">
<h2>🚚 聯群物流 出車系統</h2>

車號：
<b id="carText"></b>
<br><br>

司機：
<b id="driverNameText"></b>
</div>


<!-- 綁定司機 -->
<div id="bindArea" class="card hidden">
<h3>綁定司機</h3>

<input id="nameInput" placeholder="請輸入姓名">

<button id="bindBtn" class="primary">綁定</button>
</div>


<!-- 出車 -->
<div id="tripArea" class="card hidden">

<div class="warning">
⚠ 中區以外司機請選「區域司機」
</div>

<h3>選擇任務</h3>

<button class="task-btn" data-type="常溫">常溫配送</button>
<button class="task-btn" data-type="低溫">低溫配送</button>
<button class="task-btn" data-type="爆量專車">爆量專車</button>
<button class="task-btn" data-type="專車">專車</button>
<button class="task-btn" data-type="區域司機">區域司機</button>

<br><br>

<div id="routeBlock" class="hidden">
<label>路線</label>
<select id="routeSelect"></select>
</div>

<div id="noteArea" class="hidden">
<label>備註 / 區域</label>
<input id="noteInput" placeholder="例如：楊梅專車 / 台中">
</div>

<button id="tripBtn" class="primary">確認出車</button>

<p id="msg"></p>

</div>


<script>

/* ====== 設定 ====== */

const LIFF_ID='2008915809-vp9PFMVX'

const GAS_API_URL=
'https://script.google.com/macros/s/AKfycbzTy3tN4O_cSQCz2f2Yp8ypCmmOvttJN6OJQOU02TP1-s3_RbXfOUL6oCrmC2XJcOH5/exec'


/* ====== 全域變數 ====== */

let currentCar=''
let currentLineId=''
let currentDriverName=''
let selectedType=''
let routesData=[]


/* ====== DOM ====== */

const carText=document.getElementById('carText')
const driverNameText=document.getElementById('driverNameText')

const bindArea=document.getElementById('bindArea')
const nameInput=document.getElementById('nameInput')
const bindBtn=document.getElementById('bindBtn')

const tripArea=document.getElementById('tripArea')

const routeBlock=document.getElementById('routeBlock')
const routeSelect=document.getElementById('routeSelect')

const noteArea=document.getElementById('noteArea')
const noteInput=document.getElementById('noteInput')

const tripBtn=document.getElementById('tripBtn')

const msg=document.getElementById('msg')


/* ====== 工具 ====== */

function setMsg(t){
msg.textContent=t||''
}


/* 取得 QR 車號 */

function getCar(){

const url=new URL(window.location.href)

let car=url.searchParams.get("car")

if(car)localStorage.setItem("car",car)

if(!car)car=localStorage.getItem("car")

return car||''

}


/* API GET */

async function api(action,payload={}){

const params=new URLSearchParams({
action,
...payload
})

const res=await fetch(`${GAS_API_URL}?${params}`)

return await res.json()

}


/* 載入路線 */

async function loadRoutes(){

const result=await api('getRoutes')

if(!result.ok)return

routesData=result.routes

}


/* 任務按鈕 */

document.querySelectorAll('.task-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

selectedType=btn.dataset.type

routeSelect.innerHTML=''

/* 專車 */

if(selectedType==="專車"){

routeBlock.classList.add('hidden')
noteArea.classList.remove('hidden')

return

}

/* 區域司機 */

if(selectedType==="區域司機"){

routeBlock.classList.add('hidden')
noteArea.classList.remove('hidden')

noteInput.placeholder="請輸入區域 (例如 台中)"

return

}

noteArea.classList.add('hidden')
routeBlock.classList.remove('hidden')

const list=routesData.filter(r=>r.type===selectedType)

list.forEach(r=>{

const opt=document.createElement("option")

opt.value=r.name
opt.textContent=r.name

routeSelect.appendChild(opt)

})

})

})


/* ====== 初始化 ====== */

async function init(){

currentCar=getCar()

if(!currentCar){

carText.textContent='沒有取得車號'
return

}

carText.textContent=currentCar


await liff.init({liffId:LIFF_ID})

if(!liff.isLoggedIn()){

liff.login({redirectUri:window.location.href})
return

}

const profile=await liff.getProfile()

currentLineId=profile.userId


const result=await api('getDriver',{lineId:currentLineId})


if(result.found){

currentDriverName=result.name

driverNameText.textContent=currentDriverName

tripArea.classList.remove('hidden')

await loadRoutes()

}else{

bindArea.classList.remove('hidden')

}

}


/* ====== 綁定司機 ====== */

bindBtn.addEventListener('click',async()=>{

const name=nameInput.value.trim()

if(!name)return

await api('bindDriver',{lineId:currentLineId,name})

currentDriverName=name

driverNameText.textContent=name

bindArea.classList.add('hidden')

tripArea.classList.remove('hidden')

await loadRoutes()

})


/* ====== 出車 ====== */

tripBtn.addEventListener('click',async()=>{

if(tripBtn.disabled)return

const route=routeSelect.value
const note=noteInput.value

if(!selectedType){
setMsg("請選任務")
return
}

if(selectedType==="區域司機" && !note){
setMsg("請輸入區域")
return
}

if(selectedType!=="專車" && selectedType!=="區域司機" && !route){
setMsg("請選路線")
return
}

if(selectedType==="專車" && !note){
setMsg("請填備註")
return
}

tripBtn.disabled=true

const result=await api('logTrip',{

lineId:currentLineId,
name:currentDriverName,
car:currentCar,
type:selectedType,
route:selectedType==="區域司機"?note:route,
note:selectedType==="區域司機"?'':note

})


if(result.ok){

setMsg("出車成功")

tripBtn.innerText="已出車"

showVehicleStatus()

}else{

setMsg(result.message)

tripBtn.disabled=false

}

})


/* ====== 車輛提醒 ====== */

async function showVehicleStatus(){

const data=await api('getVehicleStatus',{car:currentCar})

if(!data.ok)return

alert(

`🚚 ${currentCar} 出車成功

保養剩餘 ${data.maintRemain} 天
下次保養 ${data.maintainDue}

驗車期限 ${data.inspectionDate}
剩餘 ${data.inspectionRemain} 天`

)

}


/* ====== 更新保養 ====== */

async function finishMaintenance(){

const yes=confirm("確認保養完成？")

if(!yes)return

await api('finishMaintenance',{car:currentCar})

alert("保養已更新")

}


/* ====== 更新驗車 ====== */

async function finishInspection(){

const yes=confirm("確認驗車完成？")

if(!yes)return

await api('finishInspection',{car:currentCar})

alert("驗車已更新")

}


/* 啟動 */

init()

</script>

</body>
</html>
