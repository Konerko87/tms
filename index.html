<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>聯群物流出車</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      padding:20px;
      font-size:22px;
      margin:0;
    }
    .card{
      background:#fff;
      padding:20px;
      border-radius:16px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }
    .hidden{ display:none; }
    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      font-size:24px;
      margin-top:12px;
      cursor:pointer;
    }
    .primary{
      background:#2c7be5;
      color:#fff;
    }
    .task-btn{
      background:#eee;
    }
    .warning{
      background:#fff3cd;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
      line-height:1.5;
    }
    input,select{
      width:100%;
      padding:14px;
      font-size:22px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }
    #msg{
      color:#c62828;
      font-weight:bold;
      min-height:28px;
    }
    .selected-task{
      outline:3px solid #2c7be5;
      background:#dbeafe;
    }
    .sub-btn{
      background:#f3f4f6;
      color:#111;
      border:1px solid #d1d5db;
      font-size:20px;
    }
    .status-box{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:14px;
      margin-top:12px;
      line-height:1.7;
      white-space:pre-line;
    }
  </style>
</head>
<body>

  <div class="card">
    <div style="font-size:28px;font-weight:bold;">🚚 聯群物流出車系統</div>
    <br>
    車號：<b id="carText"></b>
    <br><br>
    司機：<b id="driverNameText"></b>
  </div>

  <div id="bindArea" class="card hidden">
    <div style="font-size:26px;font-weight:bold;">綁定司機</div>
    <input id="nameInput" placeholder="請輸入姓名">
    <button id="bindBtn" class="primary">綁定</button>
  </div>

  <div id="tripArea" class="card hidden">
    <div class="warning">
      ⚠ 中區以外司機請選「區域司機」
    </div>

    <div style="font-size:26px;font-weight:bold;margin-bottom:8px;">選擇任務</div>

    <button class="task-btn" data-type="常溫">常溫配送</button>
    <button class="task-btn" data-type="低溫">低溫配送</button>
    <button class="task-btn" data-type="爆量專車">爆量專車</button>
    <button class="task-btn" data-type="專車">專車</button>
    <button class="task-btn" data-type="區域司機">區域司機</button>

    <div id="routeBlock" class="hidden" style="margin-top:14px;">
      路線
      <select id="routeSelect"></select>
    </div>

    <div id="areaBlock" class="hidden" style="margin-top:14px;">
      區域
      <select id="areaSelect"></select>
    </div>

    <div id="noteArea" class="hidden" style="margin-top:14px;">
      備註
      <input id="noteInput" placeholder="例如：楊梅專車">
    </div>

    <button id="tripBtn" class="primary">確認出車</button>
    <p id="msg"></p>
  </div>

  <div id="vehicleStatusCard" class="card hidden">
    <div style="font-size:26px;font-weight:bold;">車輛提醒</div>
    <div id="vehicleStatusBox" class="status-box"></div>

    <button id="maintBtn" class="sub-btn">保養已完成</button>
    <button id="inspectBtn" class="sub-btn">驗車已完成</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
