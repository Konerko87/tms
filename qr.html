<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loading...</title>
</head>

<body>

<script>

/* ⭐ debug：先看網址 */
document.body.innerText = window.location.href;

/* ⭐ 正常流程 */
const params = new URLSearchParams(location.search);
const car = params.get('car');

if(!car){

document.body.innerText = '錯誤：沒有車號';

}else{

const LIFF_URL = 'https://你的LIFF網址/index.html';

location.replace(
LIFF_URL +
'?car=' + encodeURIComponent(car) +
'#car=' + encodeURIComponent(car)
);

}

</script>

</body>
</html>
