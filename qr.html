<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loading...</title>
</head>
<body>

<script>

const params = new URLSearchParams(location.search);
const car = params.get('car');

if(!car){
  document.body.innerText = '錯誤：沒有車號';
}else{

  /* ⭐ 存 localStorage（超關鍵） */
  localStorage.setItem('car', car);

  const LIFF_URL = 'https://liff.line.me/2008915809-vp9PFMVX';

  /* ⭐ 三重保險 */
  location.replace(
    LIFF_URL +
    '?car=' + encodeURIComponent(car) +
    '#car=' + encodeURIComponent(car)
  );

}

</script>

</body>
</html>
