<script>
const params = new URLSearchParams(location.search);
let car = params.get('car');

if (!car) {
  document.body.innerText = '錯誤：沒有車號';
} else {

  try {
    car = decodeURIComponent(car);
  } catch(e){}

  car = car.trim().toUpperCase();

  /* ⭐ 雙寫入（關鍵） */
  localStorage.setItem('car', car);
  sessionStorage.setItem('car', car);

  const LIFF_URL = 'https://liff.line.me/2008915809-vp9PFMVX';

  /* ⭐ 這裡也要 encode */
  const encoded = encodeURIComponent(car);

  location.replace(
    LIFF_URL +
    '?car=' + encoded +
    '#car=' + encoded
  );
}
</script>
